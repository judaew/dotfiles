# vim:fileencoding=utf-8:ft=conf
#
# Configuring kitty: https://sw.kovidgoyal.net/kitty/conf.html

# Fonts

font_family      Iosevka Curly

font_size 11.0
disable_ligatures never

# Nerd Fonts (v3.0.0)
# Glyph sets (see https://github.com/ryanoasis/nerd-fonts/wiki/Glyph-Sets-and-Code-Points):
symbol_map U+E5FA-U+E6B7,U+E700-U+E8EF,U+ED00-U+F2FF,U+E200-U+E2A9,U+F0001-U+F1AF0,U+E300-U+E3E3,U+F400-U+F533,U+2665,U+26A1,U+E0A0-U+E0A2,U+E0B0-U+E0B3,U+E0A3,U+E0B4-U+E0C8,U+E0CA,U+E0CC-U+E0D7,U+2630,U+23FB-U+23FE,U+2B58,U+F300-U+F381,U+E000-U+E00A,U+EA60-U+EC1E,U+276C-U+2771,U+2500-U+259F,U+EE00-U+EE0B Symbols Nerd Font Mono

# Cursor customization

cursor #cccccc
cursor_text_color #1b1d1e
cursor_blink_interval 0

# Scrollback

scrollback_lines 10000
scrollback_pager_history_size 4

# Mouse

open_url_modifiers kitty_mod
open_url_with default

url_prefixes http https file ftp gemini irc gopher mailto news git
detect_urls yes
select_by_word_characters @-./_~?&=%+#

# Terminal bell

enable_audio_bell yes
visual_bell_duration 0.0

# Window layout

remember_window_size  no
initial_window_width  88c
initial_window_height 30c

window_resize_step_cells 2
window_resize_step_lines 2

draw_minimal_borders yes
resize_in_steps yes

# Color scheme

include ~/wrk/github.com/judaew/ronny.nvim/extra/kitty/ronny.conf
dim_opacity 0.75

# Advanced

clipboard_control write-clipboard write-primary no-append

term xterm-kitty

shell_integration disabled

# OS specific tweaks

macos_option_as_alt left
macos_quit_when_last_window_closed yes
macos_show_window_title_in window
macos_custom_beam_cursor no

# Keyboard shortcuts

# Fix copy/paste for Cyrillic layout
map ctrl+shift+с copy_to_clipboard
map ctrl+shift+м paste_from_clipboard

